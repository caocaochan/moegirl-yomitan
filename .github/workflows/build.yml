name: Build dictionary

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: write

concurrency:
  group: dictionary-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Restore fetch cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/moegirl-yomitan
          key: moegirl-yomitan-cache-${{ github.run_id }}
          restore-keys: |
            moegirl-yomitan-cache-

      - name: Diagnose sitemap access
        continue-on-error: true
        run: curl -I -L --max-time 30 https://mzh.moegirl.org.cn/sitemap/sitemap-index-zhmoegirl.xml

      - name: Refresh fetched data
        run: python -m moegirl_yomitan fetch --retry-attempts 8 --request-timeout 240 --backoff-base-seconds 2

      - name: Detect packaged content changes
        id: change
        run: |
          python -m moegirl_yomitan check-build-change | tee "$RUNNER_TEMP/build-change.txt"
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < "$RUNNER_TEMP/build-change.txt"

      - name: Skip automatic build when content is unchanged
        if: ${{ github.event_name != 'workflow_dispatch' && steps.change.outputs.changed != 'true' }}
        run: echo "Skipping automatic build because packaged dictionary content is unchanged."

      - name: Fetch tags
        if: ${{ github.event_name == 'workflow_dispatch' || steps.change.outputs.changed == 'true' }}
        run: git fetch --force --tags

      - name: Resolve build version
        id: version
        if: ${{ github.event_name == 'workflow_dispatch' || steps.change.outputs.changed == 'true' }}
        run: |
          build_version="$(python -c "from moegirl_yomitan.versioning import resolve_build_version; print(resolve_build_version())")"
          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"
          echo "MOEGIRL_YOMITAN_BUILD_VERSION=${build_version}" >> "$GITHUB_ENV"

      - name: Run tests
        if: ${{ github.event_name == 'workflow_dispatch' || steps.change.outputs.changed == 'true' }}
        run: pytest -q -k "not smoke_build_and_package"

      - name: Build dictionary archive
        if: ${{ github.event_name == 'workflow_dispatch' || steps.change.outputs.changed == 'true' }}
        run: python -m moegirl_yomitan build --from-cache --output dist/moegirl-yomitan.zip

      - name: Upload workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' || steps.change.outputs.changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moegirl-yomitan-${{ steps.version.outputs.build_version }}
          path: |
            dist/moegirl-yomitan.zip
            dist/moegirl-yomitan-index.json

      - name: Persist build fingerprint
        if: ${{ github.event_name == 'workflow_dispatch' || steps.change.outputs.changed == 'true' }}
        env:
          BUILD_FINGERPRINT: ${{ steps.change.outputs.fingerprint }}
        run: |
          python -c "from moegirl_yomitan.config import Settings; from moegirl_yomitan.packaging import save_build_state; import os; save_build_state(Settings(), os.environ['BUILD_FINGERPRINT'])"

      - name: Save updated fetch cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/moegirl-yomitan
          key: moegirl-yomitan-cache-${{ github.run_id }}

      - name: Create GitHub release
        if: ${{ github.event_name == 'workflow_dispatch' || steps.change.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.build_version }}" "dist/moegirl-yomitan.zip" "dist/moegirl-yomitan-index.json" \
            --title "${{ steps.version.outputs.build_version }}" \
            --notes "Automated Yomitan dictionary build for version ${{ steps.version.outputs.build_version }}."
